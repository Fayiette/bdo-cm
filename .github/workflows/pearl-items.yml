# BDO Pearl Items scraper - scheduled run.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   R2_BUCKET              - e.g. abc
#   R2_ACCESS_KEY_ID       - from Cloudflare R2 -> Manage R2 API tokens
#   R2_SECRET_ACCESS_KEY   - same
#   R2_ENDPOINT            - same
#   R2_PREFIX              - folder inside the bucket
#
# Manual run: Actions tab -> "BDO Pearl Items" -> Run workflow.

name: Scrape BDO Pearl Items

on:
  schedule:
    # Runs every 3 hours, starting at 00:00 (00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00)
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pearl-items
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: prod 
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper with R2 sync
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
          API_BASE: ${{ secrets.API_BASE }}
        run: python pearl_items.py --r2-sync
