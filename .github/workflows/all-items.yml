# BDO All Market Items scraper - scheduled run (non-pearl /market catalog).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   R2_BUCKET              - e.g. abc
#   R2_ACCESS_KEY_ID       - from Cloudflare R2 -> Manage R2 API tokens
#   R2_SECRET_ACCESS_KEY   - same
#   R2_ENDPOINT            - same
#   R2_MARKET_PREFIX       - folder inside the bucket (all-items DIM/FACT; separate from Pearl)
#
# Manual run: Actions tab -> "Scrape BDO All Market Items" -> Run workflow.
#

name: Scrape BDO All Market Items

on:
  schedule:
    # 00:26, 04:26, 08:26, 12:26, 16:26, 20:26
    - cron: "26 0,4,8,12,16,20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: all-items
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper with R2 sync
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_MARKET_PREFIX: ${{ secrets.R2_MARKET_PREFIX }}
          API_BASE: ${{ secrets.API_BASE }}
        run: python all_items.py --r2-sync
