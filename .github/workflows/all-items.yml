# BDO All Market Items scraper - scheduled run (non-pearl /market catalog).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   R2_BUCKET              - e.g. abc
#   R2_ACCESS_KEY_ID       - from Cloudflare R2 -> Manage R2 API tokens
#   R2_SECRET_ACCESS_KEY   - same
#   R2_ENDPOINT            - same
#   R2_MARKET_PREFIX       - folder inside the bucket (all-items DIM/FACT; separate from Pearl)
#
# Manual run: Actions tab -> "Scrape BDO All Market Items" -> Run workflow.
#
# After migrating from enhancement_items: remove old R2 objects DIM_Enhancement_ID.*
# and FACT_Enhancement.* if present; add R2_MARKET_PREFIX secret.

name: Scrape BDO All Market Items

on:
  schedule:
    # 00:14, 06:14, 12:14, 18:14
    - cron: "14 0,6,12,18 * * *"
    # 00:59, 06:59, 12:59, 18:59
    - cron: "59 0,6,12,18 * * *"
    # 01:44, 07:44, 13:44, 19:44
    - cron: "44 1,7,13,19 * * *"
    # 02:29, 08:29, 14:29, 20:29
    - cron: "29 2,8,14,20 * * *"
    # 03:14, 09:14, 15:14, 21:14
    - cron: "14 3,9,15,21 * * *"
    # 03:59, 09:59, 15:59, 21:59
    - cron: "59 3,9,15,21 * * *"
    # 04:44, 10:44, 16:44, 22:44
    - cron: "44 4,10,16,22 * * *"
    # 05:29, 11:29, 17:29, 23:29
    - cron: "29 5,11,17,23 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: all-items
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper with R2 sync
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_MARKET_PREFIX: ${{ secrets.R2_MARKET_PREFIX }}
          API_BASE: ${{ secrets.API_BASE }}
        run: python all_items.py --r2-sync
